$id: https://progenetix.org/schemas/ProgenetixGene/v2026-03-26
$schema: https://json-schema.org/draft/2020-12/schema
title: ProgenetixGene
description: NCBI Gene Descriptor (v2reportsGeneDescriptor) extended with GA4GH VRS
  SequenceLocations
type: object
required:
- annotations
- gene_id
- symbol
- location
properties:
  gene_id:
    type: string
    format: uint64
    title: NCBI Gene ID
  symbol:
    type: string
    title: Gene symbol
  description:
    type: string
    title: Gene name
  tax_id:
    type: string
    format: uint64
    title: NCBI Taxonomy ID for the organism
  taxname:
    type: string
    title: Taxonomic name of the organism
  common_name:
    type: string
    title: Common name of the organism
  type:
    $ref: '#/$defs/v2reportsGeneType'
    title: Type of gene
  rna_type:
    $ref: '#/$defs/v2reportsRnaType'
  orientation:
    $ref: '#/$defs/v2reportsOrientation'
    title: Direction of the gene relative to the genome coordinates
  reference_standards:
    type: array
    items:
      $ref: '#/$defs/v2reportsGenomicRegion'
  genomic_regions:
    type: array
    items:
      $ref: '#/$defs/v2reportsGenomicRegion'
  chromosomes:
    type: array
    items:
      type: string
  nomenclature_authority:
    $ref: '#/$defs/v2reportsNomenclatureAuthority'
  swiss_prot_accessions:
    type: array
    items:
      type: string
  ensembl_gene_ids:
    type: array
    items:
      type: string
  omim_ids:
    type: array
    items:
      type: string
  synonyms:
    type: array
    items:
      type: string
  replaced_gene_id:
    type: string
    format: uint64
    title: The NCBI Gene ID for the gene that was merged into the current gene record
  annotations:
    type: array
    items:
      $ref: '#/$defs/v2reportsAnnotation'
  transcript_count:
    type: integer
    title: Number of transcripts encoded by the gene
  protein_count:
    type: integer
    title: Number of proteins encoded by the gene
  transcript_type_counts:
    type: array
    items:
      $ref: '#/$defs/v2reportsTranscriptTypeCount'
  gene_groups:
    type: array
    items:
      $ref: '#/$defs/v2reportsGeneGroup'
  summary:
    type: array
    items:
      $ref: '#/$defs/v2reportsGeneSummary'
  gene_ontology:
    $ref: '#/$defs/v2reportsGeneOntology'
  locus_tag:
    type: string
  location:
    type: array
    items:
      $ref: '#/$defs/SequenceLocation'
    description: GA4GH VRS SequenceLocations mapping
additionalProperties: true
$defs:
  v2reportsGeneType:
    type: string
    enum:
    - UNKNOWN
    - tRNA
    - rRNA
    - snRNA
    - scRNA
    - snoRNA
    - PROTEIN_CODING
    - PSEUDO
    - TRANSPOSON
    - miscRNA
    - ncRNA
    - BIOLOGICAL_REGION
    - OTHER
    default: UNKNOWN
    title: 'NB: GeneType values match Entrez Gene'
  v2reportsRnaType:
    type: string
    enum:
    - rna_UNKNOWN
    - premsg
    - tmRna
    default: rna_UNKNOWN
  v2reportsOrientation:
    type: string
    enum:
    - none
    - plus
    - minus
    default: none
  v2reportsGenomicRegion:
    type: object
    properties:
      gene_range:
        $ref: '#/$defs/v2reportsSeqRangeSet'
        title: The range of this Gene record on this genomic region.
      type:
        $ref: '#/$defs/v2reportsGenomicRegionGenomicRegionType'
        title: Type of genomic region
  v2reportsNomenclatureAuthority:
    type: object
    properties:
      authority:
        type: string
        title: The nomenclature authority for this gene record
      identifier:
        type: string
        title: The nomenclature authority identifier for this gene record
  v2reportsAnnotation:
    type: object
    properties:
      assembly_accession:
        type: string
        title: Genome assembly accession
      assembly_name:
        type: string
        title: Genome assembly name
      annotation_name:
        type: string
        title: Genome annotation name
      annotation_release_date:
        type: string
        title: Genome annotation release date
      genomic_locations:
        type: array
        items:
          $ref: '#/$defs/v2reportsGenomicLocation'
  v2reportsTranscriptTypeCount:
    type: object
    properties:
      type:
        $ref: '#/$defs/v2reportsTranscriptTranscriptType'
        title: Type of transcript
      count:
        type: integer
        title: Number of transcripts of a particular type
  v2reportsGeneGroup:
    type: object
    properties:
      id:
        type: string
        title: Gene group identifier, currently these only include gene ortholog sets
      method:
        type: string
        title: Method used to calculate the gene group, currently this only includes
          "NCBI Ortholog"
  v2reportsGeneSummary:
    type: object
    properties:
      source:
        type: string
        title: Source of the gene summary
      description:
        type: string
        title: Gene summary text itself that describes the gene
      date:
        type: string
        title: Date that the gene summary was last updated
  v2reportsGeneOntology:
    type: object
    properties:
      assigned_by:
        type: string
        title: The database that made the annotation
      molecular_functions:
        type: array
        items:
          $ref: '#/$defs/v2reportsProcessMetadata'
      biological_processes:
        type: array
        items:
          $ref: '#/$defs/v2reportsProcessMetadata'
      cellular_components:
        type: array
        items:
          $ref: '#/$defs/v2reportsProcessMetadata'
  v2reportsSeqRangeSet:
    type: object
    properties:
      accession_version:
        type: string
        title: NCBI Accession.version of the sequence
      range:
        type: array
        items:
          $ref: '#/$defs/v2reportsRange'
  v2reportsGenomicRegionGenomicRegionType:
    type: string
    enum:
    - UNKNOWN
    - REFSEQ_GENE
    - PSEUDOGENE
    - BIOLOGICAL_REGION
    - OTHER
    default: UNKNOWN
  v2reportsGenomicLocation:
    type: object
    properties:
      genomic_accession_version:
        type: string
      sequence_name:
        type: string
      genomic_range:
        $ref: '#/$defs/v2reportsRange'
      exons:
        type: array
        items:
          $ref: '#/$defs/v2reportsRange'
  v2reportsTranscriptTranscriptType:
    type: string
    enum:
    - UNKNOWN
    - PROTEIN_CODING
    - NON_CODING
    - PROTEIN_CODING_MODEL
    - NON_CODING_MODEL
    default: UNKNOWN
  v2reportsProcessMetadata:
    type: object
    properties:
      name:
        type: string
        title: Gene ontology term name
      go_id:
        type: string
        title: Gene ontology identifier
      evidence_code:
        type: string
        title: Indicates how the annotation is supported
      qualifier:
        type: string
        title: Explicitly link gene products to GO terms
      reference:
        $ref: '#/$defs/v2reportsReference'
        title: Source of evidence supporting the GO annotation
  v2reportsRange:
    type: object
    properties:
      begin:
        type: string
        format: uint64
        title: Sequence start position
      end:
        type: string
        format: uint64
        title: Sequence stop position
      orientation:
        $ref: '#/$defs/v2reportsOrientation'
        title: Direction relative to the genome
      order:
        type: integer
        title: The position of this sequence in a group of sequences
      ribosomal_slippage:
        type: integer
        title: When ribosomal slippage is desired, fill out slippage amount between
          this and previous range.
  v2reportsReference:
    type: object
    properties:
      pmids:
        type: array
        items:
          type: string
          format: uint64
  SequenceLocation:
    type: object
    required:
    - type
    - sequence_reference
    - start
    - end
    - sequence_id
    - chromosome
    properties:
      type:
        type: string
        const: SequenceLocation
      sequence_reference:
        $ref: '#/$defs/SequenceReference'
      start:
        type: integer
        minimum: 0
      end:
        type: integer
        minimum: 0
      sequence_id:
        type: string
        pattern: '^refseq:'
      chromosome:
        type: string
  SequenceReference:
    type: object
    required:
    - type
    - refget_accession
    properties:
      type:
        type: string
        const: SequenceReference
      refget_accession:
        type: string
        pattern: ^SQ\.[a-zA-Z0-9_-]+$